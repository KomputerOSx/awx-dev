---
- name: Provision Ubuntu kiosk machines
  hosts: "{{ target_group | default('kiosks') }}"
  become: true
  gather_facts: true

  vars:
    kiosk_session_setup_path: /usr/local/bin/rxterminal-session-setup.sh
    kiosk_first_login_desktop_path: "{{ kiosk_home }}/.config/autostart/rxterminal-first-login.desktop"
    rxterminal_install_script_path: /tmp/install-rxterminal.sh

  tasks:
    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install curl bootstrap dependency
      ansible.builtin.apt:
        name:
          - curl
        state: present

    - name: Download RxTerminal bootstrap installer
      ansible.builtin.get_url:
        url: "{{ rxterminal_install_script_url }}"
        dest: "{{ rxterminal_install_script_path }}"
        mode: "0755"

    - name: Install RxTerminal via bootstrap script
      ansible.builtin.command:
        argv:
          - bash
          - "{{ rxterminal_install_script_path }}"
      register: rxterminal_install
      changed_when: "'is already the newest version' not in (rxterminal_install.stdout | default('') ~ rxterminal_install.stderr | default(''))"

    - name: Verify packaged install-ubuntu.sh exists
      ansible.builtin.stat:
        path: /opt/RxTerminal/resources/scripts/install-ubuntu.sh
      register: rxterminal_user_installer

    - name: Fail when packaged install-ubuntu.sh is missing
      ansible.builtin.assert:
        that:
          - rxterminal_user_installer.stat.exists
          - rxterminal_user_installer.stat.executable
        fail_msg: "RxTerminal was installed, but /opt/RxTerminal/resources/scripts/install-ubuntu.sh is missing or not executable."

    - name: Install kiosk desktop/session packages
      ansible.builtin.apt:
        name: "{{ kiosk_base_packages }}"
        state: present

    - name: Install desktop packages
      ansible.builtin.apt:
        name: "{{ kiosk_desktop_packages }}"
        state: present
      when: kiosk_install_desktop | bool

    - name: Install VM guest packages
      ansible.builtin.apt:
        name: "{{ kiosk_vm_guest_packages }}"
        state: present
      when: kiosk_vm_guest_packages | length > 0

    - name: Ensure kiosk group exists
      ansible.builtin.group:
        name: "{{ kiosk_group }}"
        state: present

    - name: Ensure kiosk user exists
      ansible.builtin.user:
        name: "{{ kiosk_user }}"
        group: "{{ kiosk_group }}"
        home: "{{ kiosk_home }}"
        shell: "{{ kiosk_shell }}"
        password: "{{ kiosk_password_hash }}"
        create_home: true
        append: true
        groups:
          - audio
          - video
          - plugdev
        state: present

    - name: Ensure kiosk autostart directory exists
      ansible.builtin.file:
        path: "{{ kiosk_home }}/.config/autostart"
        state: directory
        owner: "{{ kiosk_user }}"
        group: "{{ kiosk_group }}"
        mode: "0755"

    - name: Install first-login session helper
      ansible.builtin.copy:
        src: ../files/rxterminal-session-setup.sh
        dest: "{{ kiosk_session_setup_path }}"
        mode: "0755"
        owner: root
        group: root

    - name: Install first-login desktop entry
      ansible.builtin.copy:
        dest: "{{ kiosk_first_login_desktop_path }}"
        owner: "{{ kiosk_user }}"
        group: "{{ kiosk_group }}"
        mode: "0644"
        content: |
          [Desktop Entry]
          Type=Application
          Version=1.0
          Name=RxTerminal First Login Setup
          Comment=Finalize kiosk user session configuration
          Exec={{ kiosk_session_setup_path }}
          Terminal=false
          X-GNOME-Autostart-enabled=true
          NoDisplay=true

    - name: Ensure kiosk user owns home directory
      ansible.builtin.file:
        path: "{{ kiosk_home }}"
        state: directory
        owner: "{{ kiosk_user }}"
        group: "{{ kiosk_group }}"
        recurse: true

    - name: Configure GDM autologin
      ansible.builtin.blockinfile:
        path: /etc/gdm3/custom.conf
        marker: "# {mark} ANSIBLE RXTERMINAL KIOSK"
        insertafter: '^\[daemon\]'
        block: |
          AutomaticLoginEnable=true
          AutomaticLogin={{ kiosk_user }}
      when: kiosk_enable_autologin | bool
      notify: Restart gdm

    - name: Disable GDM autologin when requested
      ansible.builtin.blockinfile:
        path: /etc/gdm3/custom.conf
        marker: "# {mark} ANSIBLE RXTERMINAL KIOSK"
        state: absent
      when: not kiosk_enable_autologin | bool
      notify: Restart gdm

  handlers:
    - name: Restart gdm
      ansible.builtin.service:
        name: gdm3
        state: restarted
